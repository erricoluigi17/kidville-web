# =============================================================================
# Kidville · ANDROID — percorso utente reale della SEGRETERIA/DIREZIONE (cockpit /admin)
#   login → dashboard → tab Avvisi → Indietro → tab Mensa → Indietro →
#           Menu (bottom-sheet) → Anagrafica → Indietro
#
# Prerequisiti (vedi .claude/maestro-flows/README.md):
#   - emulatore Android avviato
#   - server sull'host, porta 3000 — usare `npx next start` (BUILD di produzione):
#     con `next dev`/Turbopack l'HMR-websocket non completa l'handshake via il
#     bridge 10.0.2.2 e la WebView non idrata (React non monta i fiber).
#   - APK buildato con CAP_SERVER_URL="http://10.0.2.2:3000" e installato
#   - credenziali negli env MAESTRO_KV_EMAIL_SEGRETERIA / MAESTRO_KV_PASSWORD
#     ⚠️ vanno ESPORTATE nell'ambiente: un ${...} non risolto viene digitato come
#     la stringa letterale "undefined". L'email dell'account TEST segreteria è
#     `test.segreteria@kidville.test`; la password è quella comune degli account
#     TEST (nel PRD / e2e/primaria-360/config/accounts.ts) — NON scriverla qui.
#
# Esecuzione:
#   export MAESTRO_KV_EMAIL_SEGRETERIA=... MAESTRO_KV_PASSWORD=...
#   maestro test .claude/maestro-flows/android-percorso-segreteria.yaml
#
# NB: l'app è una WebView Capacitor che carica l'app web da server.url. I tempi
# di attesa sono generosi di proposito: la prima pagina passa dalla rete.
# Da questo ciclo la segreteria naviga come genitore/docente: una BOTTOM-NAV a
# pillola (Home · Avvisi · Contabilità · Mensa + «Menu») al posto del vecchio
# drawer laterale. I 4 tab si toccano col loro testo; il tab «Menu» ha aria-label
# "Menu · tutte le sezioni" e apre un bottom-sheet con le altre sezioni
# (Anagrafica in evidenza). Selettori ancorati a testi STABILI del cockpit
# ri-skinnato: "Dashboard Direzione", "Mensa & Cucina", "Anagrafica Generale".
# =============================================================================
appId: it.kidville.app
name: Kidville · Android — percorso segreteria
tags:
  - android
  - segreteria
env:
  KV_EMAIL: ${MAESTRO_KV_EMAIL_SEGRETERIA}
  KV_PASSWORD: ${MAESTRO_KV_PASSWORD}
---
- launchApp:
    clearState: true

# ── 1. LOGIN ─────────────────────────────────────────────────────────────────
# Card di login: titolo "Benvenuto/a!", campi Email e Password, CTA "Accedi".
- extendedWaitUntil:
    visible: "Accedi al tuo account Kidville"
    timeout: 60000
- assertVisible: "Benvenuto/a!"
- takeScreenshot: /tmp/kv-android-segreteria-0-login

- tapOn:
    below: "Email"
- inputText: ${KV_EMAIL}
- hideKeyboard

- tapOn:
    below: "Password"
- inputText: ${KV_PASSWORD}
- hideKeyboard

- tapOn: "Accedi"

# Il primo avvio può mostrare il dialog nativo dei permessi notifiche: chiudilo.
- runFlow:
    when:
      visible: "Non consentire"
    commands:
      - tapOn: "Non consentire"

# ── 2. DASHBOARD (cockpit Direzione/Segreteria) ──────────────────────────────
# Lo staff atterra su /admin. Heading stabile (E2E) "Dashboard Direzione".
# Su mobile la nav è la bottom-nav a pillola: i tab e il bottone «Menu» sono
# sempre presenti (niente più drawer laterale).
- extendedWaitUntil:
    visible: "Dashboard Direzione"
    timeout: 60000
- assertVisible: "Avvisi"
- assertVisible:
    text: "Menu · tutte le sezioni"
- takeScreenshot: /tmp/kv-android-segreteria-1-dashboard

# ── 3. TAB «AVVISI» ──────────────────────────────────────────────────────────
- tapOn: "Avvisi"
- extendedWaitUntil:
    visible: "Nuovo avviso"
    timeout: 45000
- assertVisible: "Avvisi pubblicati"
- takeScreenshot: /tmp/kv-android-segreteria-2-avvisi

# ── 4. TASTO INDIETRO DI ANDROID → dashboard ─────────────────────────────────
# Deve tornare DENTRO l'app (al cockpit), non chiudere l'app.
- back
- extendedWaitUntil:
    visible: "Dashboard Direzione"
    timeout: 30000

# ── 5. TAB «MENSA» ───────────────────────────────────────────────────────────
- tapOn: "Mensa"
- extendedWaitUntil:
    visible: "Mensa & Cucina"
    timeout: 45000
- takeScreenshot: /tmp/kv-android-segreteria-3-mensa

# ── 6. TASTO INDIETRO DI ANDROID → dashboard ─────────────────────────────────
- back
- extendedWaitUntil:
    visible: "Dashboard Direzione"
    timeout: 30000

# ── 7. TAB «MENU» → BOTTOM-SHEET → ANAGRAFICA ────────────────────────────────
# Il tab «Menu» apre il bottom-sheet modale con tutte le altre sezioni;
# "Anagrafica" è la voce in evidenza in cima (sottotitolo univoco).
- tapOn:
    text: "Menu · tutte le sezioni"
- extendedWaitUntil:
    visible: ".*Alunni, famiglie e personale.*"
    timeout: 15000
- takeScreenshot: /tmp/kv-android-segreteria-4-menu
- tapOn:
    text: ".*Anagrafica.*"
- extendedWaitUntil:
    visible: "Anagrafica Generale"
    timeout: 45000
- assertVisible: "Gestione studenti, genitori e personale"
- takeScreenshot: /tmp/kv-android-segreteria-5-anagrafica

# ── 8. TASTO INDIETRO DI ANDROID → dashboard ─────────────────────────────────
- back
- extendedWaitUntil:
    visible: "Dashboard Direzione"
    timeout: 30000
- takeScreenshot: /tmp/kv-android-segreteria-6-back
