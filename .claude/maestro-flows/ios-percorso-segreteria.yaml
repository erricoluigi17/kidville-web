# =============================================================================
# Kidville · iOS — percorso utente reale della SEGRETERIA/DIREZIONE (cockpit /admin)
#   login → dashboard → tab Avvisi → tab Mensa → Menu (bottom-sheet) →
#           Anagrafica → tab Home
#
# Prerequisiti (vedi .claude/maestro-flows/README.md):
#   - simulatore iOS avviato (xcrun simctl boot …)
#   - dev server sull'host, porta 3000
#   - App.app buildata con CAP_SERVER_URL="http://localhost:3000" e installata
#   - credenziali negli env MAESTRO_KV_EMAIL_SEGRETERIA / MAESTRO_KV_PASSWORD
#     L'email dell'account TEST segreteria è `test.segreteria@kidville.test`; la
#     password è quella comune degli account TEST (PRD / e2e config) — NON qui.
#
# Esecuzione:
#   maestro test -e KV_EMAIL="$MAESTRO_KV_EMAIL_SEGRETERIA" \
#                -e KV_PASSWORD="$MAESTRO_KV_PASSWORD" \
#                .claude/maestro-flows/ios-percorso-segreteria.yaml
#
# Differenze rispetto ad Android: dal simulatore l'host è `localhost` (non
# 10.0.2.2), e non c'è tasto Indietro hardware → i "ritorni" avvengono toccando i
# tab della bottom-nav, che è persistente su ogni pagina. Su WebView iOS
# `hideKeyboard` fallisce ("Couldn't hide the keyboard"): la tastiera si chiude
# con un tap sul titolo statico "Benvenuto/a!". Da questo ciclo la segreteria
# naviga con la BOTTOM-NAV a pillola (Home · Avvisi · Contabilità · Mensa +
# «Menu») come genitore/docente, NON più col drawer. Il tab «Menu» ha aria-label
# "Menu · tutte le sezioni" e apre un bottom-sheet (Anagrafica in evidenza).
# Selettori ancorati a testi STABILI: "Dashboard Direzione", "Mensa & Cucina",
# "Anagrafica Generale".
# =============================================================================
appId: it.kidville.app
name: Kidville · iOS — percorso segreteria
tags:
  - ios
  - segreteria
env:
  KV_EMAIL: ${MAESTRO_KV_EMAIL_SEGRETERIA}
  KV_PASSWORD: ${MAESTRO_KV_PASSWORD}
---
- launchApp:
    clearState: true

# ── 1. LOGIN ─────────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible: "Accedi al tuo account Kidville"
    timeout: 60000
- assertVisible: "Benvenuto/a!"
- takeScreenshot: /tmp/kv-ios-segreteria-0-login

- tapOn:
    below: "Email"
- inputText: ${KV_EMAIL}
- tapOn: "Benvenuto/a!"    # WebView-safe: chiude la tastiera (no hideKeyboard)

- tapOn:
    below: "Password"
- inputText: ${KV_PASSWORD}
- tapOn: "Benvenuto/a!"

- tapOn: "Accedi"

# Il primo avvio può mostrare il dialog nativo dei permessi notifiche: chiudilo.
- runFlow:
    when:
      visible: "Non consentire"
    commands:
      - tapOn: "Non consentire"

# ── 2. DASHBOARD (cockpit Direzione/Segreteria) ──────────────────────────────
# Lo staff atterra su /admin. Heading stabile (E2E) "Dashboard Direzione".
# Su mobile la nav è la bottom-nav a pillola: i tab e il bottone «Menu» sono
# sempre presenti (niente più drawer laterale).
- extendedWaitUntil:
    visible: "Dashboard Direzione"
    timeout: 60000
- assertVisible: "Avvisi"
- assertVisible:
    text: "Menu · tutte le sezioni"
- takeScreenshot: /tmp/kv-ios-segreteria-1-dashboard

# ── 3. TAB «AVVISI» ──────────────────────────────────────────────────────────
- tapOn: "Avvisi"
- extendedWaitUntil:
    visible: "Nuovo avviso"
    timeout: 45000
- assertVisible: "Avvisi pubblicati"
- takeScreenshot: /tmp/kv-ios-segreteria-2-avvisi

# ── 4. TAB «MENSA» (la bottom-nav è persistente: niente back hardware) ────────
- tapOn: "Mensa"
- extendedWaitUntil:
    visible: "Mensa & Cucina"
    timeout: 45000
- takeScreenshot: /tmp/kv-ios-segreteria-3-mensa

# ── 5. TAB «MENU» → BOTTOM-SHEET → ANAGRAFICA ────────────────────────────────
# Il tab «Menu» apre il bottom-sheet modale con tutte le altre sezioni;
# "Anagrafica" è la voce in evidenza in cima (sottotitolo univoco).
- tapOn:
    text: "Menu · tutte le sezioni"
- extendedWaitUntil:
    visible: ".*Alunni, famiglie e personale.*"
    timeout: 15000
- takeScreenshot: /tmp/kv-ios-segreteria-4-menu
- tapOn:
    text: ".*Anagrafica.*"
- extendedWaitUntil:
    visible: "Anagrafica Generale"
    timeout: 45000
- assertVisible: "Gestione studenti, genitori e personale"
- takeScreenshot: /tmp/kv-ios-segreteria-5-anagrafica

# ── 6. RITORNO AL COCKPIT (tab «Home» della bottom-nav) ──────────────────────
# Verifica anche che la bottom-nav resti agganciata sopra la safe-area (home
# indicator) e che il tab Home riporti al cockpit.
- tapOn: "Home"
- extendedWaitUntil:
    visible: "Dashboard Direzione"
    timeout: 30000
- takeScreenshot: /tmp/kv-ios-segreteria-6-home
